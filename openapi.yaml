openapi: 3.0.0
info:
  title: API MiniBlog
  description: API REST para gestionar authors y posts - Proyecto Integrador Módulo 2, Henry
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Servidor local de desarrollo

components:
  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: José Ferrer
        email:
          type: string
          example: jose@miniblog.com
        bio:
          type: string
          example: Backend developer en formación
        created_at:
          type: string
          format: date-time

    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        author_id:
          type: integer
          example: 1
        title:
          type: string
          example: Mi primer post en MiniBlog
        content:
          type: string
          example: Este es el contenido del post
        published:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
          example: Author no encontrado

paths:
  /authors:
    get:
      summary: Listar todos los authors
      tags: [Authors]
      responses:
        '200':
          description: Lista de authors obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'
    post:
      summary: Crear un author nuevo
      tags: [Authors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                  example: Laura Gómez
                email:
                  type: string
                  example: laura@miniblog.com
                bio:
                  type: string
                  example: Periodista especializada en tecnología
      responses:
        '201':
          description: Author creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '500':
          description: Error del servidor (ej. email duplicado)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /authors/{id}:
    get:
      summary: Obtener el detalle de un author por su id
      tags: [Authors]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Author encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: Author no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Actualizar un author existente
      tags: [Authors]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: Blanca Sanchez
                email:
                  type: blank@miniblog.com
                bio:
                  type: Prueba de actualizacion de datos para autores
      responses:
        '200':
          description: Author actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Eliminar un author (borra en cascada sus posts)
      tags: [Authors]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 2
      responses:
        '200':
          description: Author eliminado exitosamente, se devuelve el registro borrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: Author no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /posts:
    get:
      summary: Listar todos los posts
      tags: [Posts]
      responses:
        '200':
          description: Lista de posts obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
    post:
      summary: Crear un post nuevo (valida que el author exista)
      tags: [Posts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [authorId, title, content]
              properties:
                authorId:
                  type: integer
                  example: 1
                title:
                  type: string
                  example: Un nuevo post de prueba
                content:
                  type: string
                  example: Contenido del post
                published:
                  type: boolean
                  example: true
      responses:
        '201':
          description: Post creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: El author especificado no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /posts/{id}:
    get:
      summary: Obtener el detalle de un post por su id
      tags: [Posts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Actualizar un post existente
      tags: [Posts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: Prueba de actualizacion para post
                content:
                  type: Put te permite actualizar pero solo si el authorId existe
                published:
                  type: boolean
      responses:
        '200':
          description: Post actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Eliminar un post
      tags: [Posts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 3
      responses:
        '200':
          description: Post eliminado exitosamente, se devuelve el registro borrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /posts/author/{authorId}:
    get:
      summary: Listar los posts de un author específico (usa JOIN con authors)
      tags: [Posts]
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Lista de posts del author (puede ser un array vacío si no tiene posts)
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: '#/components/schemas/Post'
                    - type: object
                      properties:
                        author_name:
                          type: string
                          example: José Ferrer
                        author_email:
                          type: string
                          example: jose@miniblog.com